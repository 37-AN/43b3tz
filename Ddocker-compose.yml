# 43V3R BET AI Platform - Production Docker Compose Configuration
# Multi-service deployment with PostgreSQL and Redis

version: '3.9'

services:
  # ==================== DATABASE ====================
  
  postgres:
    image: postgres:16-alpine
    container_name: 43v3r-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-43v3r}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-43v3r_secure_password}
      POSTGRES_DB: ${DB_NAME:-43v3r_bet}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-43v3r} -d ${DB_NAME:-43v3r_bet}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - 43v3r-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==================== CACHE ====================
  
  redis:
    image: redis:7-alpine
    container_name: 43v3r-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-43v3r_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-43v3r_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - 43v3r-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ==================== FRONTEND (Next.js) ====================
  
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        NODE_ENV: production
    container_name: 43v3r-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-43v3r}:${DB_PASSWORD:-43v3r_secure_password}@postgres:5432/${DB_NAME:-43v3r_bet}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-43v3r_redis_password}@redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - AI_ENGINE_URL=http://ai-engine:3006
      - SCRAPER_URL=http://scraper-service:3005
      - REALTIME_URL=http://realtime-service:3003
      - TELEGRAM_BOT_URL=http://telegram-bot:3008
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - 43v3r-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
      replicas: 1

  # ==================== AI ENGINE ====================
  
  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai-engine
      args:
        NODE_ENV: production
    container_name: 43v3r-ai-engine
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DATABASE_URL=postgresql://${DB_USER:-43v3r}:${DB_PASSWORD:-43v3r_secure_password}@postgres:5432/${DB_NAME:-43v3r_bet}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-43v3r_redis_password}@redis:6379
      - MIN_EDGE_THRESHOLD=${MIN_EDGE_THRESHOLD:-0.05}
      - MIN_CONFIDENCE_THRESHOLD=${MIN_CONFIDENCE_THRESHOLD:-0.65}
    ports:
      - "${AI_ENGINE_PORT:-3006}:3006"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - 43v3r-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==================== SCRAPER SERVICE ====================
  
  scraper-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: scraper-service
      args:
        NODE_ENV: production
    container_name: 43v3r-scraper
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DATABASE_URL=postgresql://${DB_USER:-43v3r}:${DB_PASSWORD:-43v3r_secure_password}@postgres:5432/${DB_NAME:-43v3r_bet}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-43v3r_redis_password}@redis:6379
      - SCRAPER_INTERVAL=${SCRAPER_INTERVAL:-300000}
      - ODDS_API_KEY=${ODDS_API_KEY:-}
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}
    ports:
      - "${SCRAPER_PORT:-3005}:3005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - 43v3r-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ==================== TELEGRAM BOT ====================
  
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: telegram-bot
      args:
        NODE_ENV: production
    container_name: 43v3r-telegram
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3008
      - DATABASE_URL=postgresql://${DB_USER:-43v3r}:${DB_PASSWORD:-43v3r_secure_password}@postgres:5432/${DB_NAME:-43v3r_bet}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-43v3r_redis_password}@redis:6379
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHANNEL_ID=${TELEGRAM_CHANNEL_ID:-}
      - AI_ENGINE_URL=http://ai-engine:3006
    ports:
      - "${TELEGRAM_PORT:-3008}:3008"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3008/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - 43v3r-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ==================== REALTIME SERVICE (Socket.io) ====================
  
  realtime-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: realtime-service
      args:
        NODE_ENV: production
    container_name: 43v3r-realtime
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=postgresql://${DB_USER:-43v3r}:${DB_PASSWORD:-43v3r_secure_password}@postgres:5432/${DB_NAME:-43v3r_bet}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-43v3r_redis_password}@redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://43v3r.bet}
    ports:
      - "${REALTIME_PORT:-3003}:3003"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - 43v3r-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ==================== OPTIONAL: NGINX REVERSE PROXY ====================
  
  nginx:
    image: nginx:alpine
    container_name: 43v3r-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - realtime-service
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - 43v3r-network
    profiles:
      - production
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

# ==================== NETWORKS ====================

networks:
  43v3r-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==================== VOLUMES ====================

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
